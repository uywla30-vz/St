<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jules Recreation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="sidebar">
        <h2>Files</h2>
        <div id="file-list"></div>
    </div>
    <div id="main">
        <div id="header">
            <div style="display: flex; align-items: center;">
                <button id="toggle-sidebar" style="margin-right: 15px; padding: 5px 10px; cursor: pointer;">☰</button>
                <h1>Jules</h1>
            </div>
            <div style="display: flex; align-items: center;">
                <button id="reset-btn" style="margin-right: 20px; padding: 5px 10px; cursor: pointer; background: #e67e22; color: white; border: none;">Clear Context</button>
                <div id="status">Ready</div>
            </div>
        </div>
        <div id="code-viewer">
            <pre><code id="file-content">Select a file to view</code></pre>
        </div>
        <div id="terminal-container">
            <div id="terminal"></div>
            <div id="input-area">
                <input type="text" id="task-input" placeholder="What task should Jules perform?">
                <button id="run-btn">Run Task</button>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
